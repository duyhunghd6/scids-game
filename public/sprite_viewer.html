<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #333; color: white; Arial, sans-serif; }
        .grid-container {
            position: relative;
            display: inline-block;
            background-color: #000;
        }
        .sprite-img {
            display: block;
            image-rendering: pixelated;
        }
        .grid {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(to right, rgba(255,0,0,0.5) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255,0,0,0.5) 1px, transparent 1px);
            background-size: 48px 48px; /* 16 * 3 */
            pointer-events: none;
        }
        .number {
            position: absolute;
            font-size: 10px;
            color: yellow;
            line-height: 1;
        }
    </style>
</head>
<body>
    <h1>Enemies Viewer (3x)</h1>
    <div class="grid-container">
        <!-- Scale 3x of 808x128 = 2424x384 -->
        <img src="/assets/mario/enemies.png" class="sprite-img" style="width: 2424px; height: 384px;" />
        <div class="grid" id="grid"></div>
    </div>
    <script>
        const grid = document.getElementById('grid');
        for (let y = 0; y < 8; y++) {
            for (let x = 0; x < 50; x++) {
                if (x > 15) continue; // just show first 16 columns
                let div = document.createElement('div');
                div.className = 'number';
                div.style.left = (x * 48 + 2) + 'px';
                div.style.top = (y * 48 + 2) + 'px';
                div.innerText = `${x},${y}`;
                grid.appendChild(div);
            }
        }
    </script>
</body>
</html>
